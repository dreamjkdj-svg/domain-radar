[build]
  publish = "."
  functions = "netlify/functions"

# 매일 KST 06:00 자동 크롤링 (UTC 21:00)
[functions."crawl"]
  schedule = "0 21 * * *"

[[redirects]]
  from  = "/api/crawl"
  to    = "/.netlify/functions/crawl"
  status = 200

[[redirects]]
  from  = "/api/analyze-pro"
  to    = "/.netlify/functions/analyze-pro"
  status = 200

[[redirects]]
  from  = "/api/create-checkout"
  to    = "/.netlify/functions/create-checkout"
  status = 200

[[redirects]]
  from  = "/api/stripe-webhook"
  to    = "/.netlify/functions/stripe-webhook"
  status = 200

[[redirects]]
  from  = "/*"
  to    = "/index.html"
  status = 200
